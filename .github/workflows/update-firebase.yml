name: Update Firebase Data

on:
  schedule:
    # 평일 한국시간 오전9시~오후6시 매 1시간 (UTC 기준)
    - cron: '0 0-9 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin yfinance

      - name: Run update script
        env:
          FIREBASE_PROJECT_ID: fngu-buy-signal
          FIREBASE_DB_URL: https://fngu-buy-signal-default-rtdb.firebaseio.com
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python update_data.py
